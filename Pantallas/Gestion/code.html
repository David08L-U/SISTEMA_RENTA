<body class="bg-surface-container-low text-on-surface font-body-md h-screen overflow-hidden flex">
<!-- SideNavBar (Shared Component) -->
<aside class="hidden md:flex flex-col h-screen p-4 space-y-2 bg-surface-container-low dark:bg-inverse-surface border-r border-outline-variant dark:border-on-surface-variant w-64 shrink-0">
<div class="mb-8 px-2 flex items-center gap-3">
<div class="w-10 h-10 rounded bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined">domain</span>
</div>
<div>
<h1 class="font-headline-md text-headline-md text-primary truncate">Admin Panel</h1>
<p class="font-label-sm text-label-sm text-on-surface-variant truncate">Property Management</p>
</div>
</div>
<nav class="flex-1 space-y-1">
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-md text-label-md" href="#">

<a class="flex items-center gap-3 px-3 py-2.5 bg-secondary-container dark:bg-secondary text-on-secondary-container dark:text-on-secondary rounded-lg transition-transform duration-150 active:scale-95 font-label-md text-label-md" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">apartment</span>
                Properties
            </a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">calendar_today</span>
                Bookings
            </a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">payments</span>
                Accounting
            </a>
<a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">analytics</span>
                Reports
            </a>
</nav>
<div class="mt-auto pt-4 border-t border-outline-variant dark:border-on-surface-variant space-y-1">
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-sm text-label-sm" href="#">
<span class="material-symbols-outlined">help</span>
                Help Center
            </a>
<a class="flex items-center gap-3 px-3 py-2 rounded-lg text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-transform duration-150 active:scale-95 font-label-sm text-label-sm" href="#">
<span class="material-symbols-outlined">logout</span>
                Logout
            </a>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col h-screen overflow-hidden bg-surface">
<!-- Top App Bar for Task Context -->
<header class="h-16 flex items-center px-gutter border-b border-outline-variant bg-surface-container-lowest shrink-0">
<div class="max-w-container-max w-full mx-auto flex items-center justify-between">
<div class="flex items-center gap-4">
<button class="p-2 rounded-full hover:bg-surface-container-high text-on-surface-variant transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface">Agregar/Editar Departamento</h2>
</div>
</div>
<div class="flex items-center gap-2">
<button class="px-4 py-2 rounded border border-outline-variant text-primary font-label-md text-label-md hover:bg-surface-container-low transition-colors duration-200">
                        Cancelar
                    </button>
<button class="px-6 py-2 rounded bg-primary text-on-primary font-label-md text-label-md hover:opacity-90 transition-opacity duration-200 shadow-sm active:shadow-inner">
                        Guardar
                    </button>
</div>
</div>
</header>
<!-- Form Area -->
<div class="flex-1 overflow-y-auto p-gutter">
<div class="max-w-4xl mx-auto">
<form class="bg-surface-container-lowest rounded-xl custom-shadow border border-outline-variant overflow-hidden">
<div class="p-8">
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-6 pb-2 border-b border-outline-variant">Detalles de la Propiedad</h3>
<!-- 2 Column Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<!-- Dirección -->
<div class="md:col-span-2">
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="direccion">Dirección</label>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest px-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="direccion" name="direccion" placeholder="Ej. Av. Paseo de la Reforma 250" type="text"/>
</div>
<!-- Colonia -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="colonia">Colonia</label>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest px-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="colonia" name="colonia" placeholder="Ej. Juárez" type="text"/>
</div>
<!-- Ciudad -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="ciudad">Ciudad</label>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest px-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="ciudad" name="ciudad" placeholder="Ej. Ciudad de México" type="text"/>
</div>
<!-- Habitaciones -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="habitaciones">Habitaciones (número)</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-base">bed</span>
</span>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest pl-10 pr-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="habitaciones" min="0" name="habitaciones" placeholder="0" type="number"/>
</div>
</div>
<!-- Baños -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="banos">Baños (número)</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-base">shower</span>
</span>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest pl-10 pr-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="banos" min="0" name="banos" placeholder="0" step="0.5" type="number"/>
</div>
</div>
<!-- Precio de renta -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="precio">Precio de renta</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-base">payments</span>
</span>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest pl-10 pr-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="precio" min="0" name="precio" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Estado -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="estado">Estado</label>
<select class="w-full rounded border border-outline-variant bg-surface-container-lowest px-4 py-2.5 text-body-md text-on-surface input-focus-ring appearance-none" id="estado" name="estado">
<option disabled="" selected="" value="">Seleccione estado...</option>
<option value="disponible">Disponible</option>
<option value="rentado">Rentado</option>
<option value="mantenimiento">En Mantenimiento</option>
</select>
</div>
</div>
<!-- Spacer / Divider -->
<div class="h-8 border-b border-outline-variant mb-8"></div>
<h3 class="font-headline-sm text-headline-sm text-on-surface mb-6 pb-2 border-b border-outline-variant">Información de Arrendamiento</h3>
<div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
<!-- Nombre del arrendatario -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="arrendatario">Nombre del arrendatario</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-secondary">
<span class="material-symbols-outlined text-base">person</span>
</span>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest pl-10 pr-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="arrendatario" name="arrendatario" placeholder="Nombre completo" type="text"/>
</div>
</div>
<!-- Fecha de inicio -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1" for="fecha_inicio">Fecha de inicio</label>
<input class="w-full rounded border border-outline-variant bg-surface-container-lowest px-4 py-2.5 text-body-md text-on-surface input-focus-ring" id="fecha_inicio" name="fecha_inicio" type="date"/>
</div>
</div>
</div>
<!-- Bottom Action Bar (Mobile fallback if top is missed, or just extra padding) -->
<div class="bg-surface-container p-6 flex justify-end gap-3 border-t border-outline-variant md:hidden">
<button class="px-4 py-2 rounded border border-outline-variant text-primary font-label-md text-label-md" type="button">
                            Cancelar
                        </button>
<button class="px-6 py-2 rounded bg-primary text-on-primary font-label-md text-label-md custom-shadow" type="submit">
                            Guardar
                        </button>
</div>
</form>
</div>
<!-- Padding at bottom -->
<div class="h-12"></div>
</div>
</main>
</body></html>
